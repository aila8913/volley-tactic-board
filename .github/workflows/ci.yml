name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # lint 和 format 檢查放最前面：它們最快跑完，錯了就提早失敗，
      # 不用等 typecheck/test 跑完才知道。--check 只檢查不改檔案（--write 才會改）。
      - run: pnpm run lint
      - run: pnpm exec prettier --check .
      - run: pnpm run typecheck
      - run: pnpm run test
