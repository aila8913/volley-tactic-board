kind = "web"
previewPath = "/"
title = "排球戰術板"
version = "1.0.0"
id = "artifacts/volleyball-tactics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23957

[services.development]
run = "pnpm --filter @workspace/volleyball-tactics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/volleyball-tactics", "run", "build" ]
publicDir = "artifacts/volleyball-tactics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23957"
BASE_PATH = "/"
