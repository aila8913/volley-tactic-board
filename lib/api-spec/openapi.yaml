openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: matches
    description: Matches, and the players/sets/rallies/events nested under a match
  - name: tactics
    description: Saved tactics board configurations (rotations, markers, defense ranges)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: createMatch
      tags: [matches]
      summary: Create a match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMatch"
      responses:
        "201":
          description: Created match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{matchId}:
    parameters:
      - $ref: "#/components/parameters/MatchId"
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a match by id
      responses:
        "200":
          description: The match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
    patch:
      operationId: updateMatch
      tags: [matches]
      summary: Update a match (e.g. attach a video_url for post-game review)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMatch"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
    delete:
      operationId: deleteMatch
      tags: [matches]
      summary: Delete a match (cascades to its players/sets/rallies/events)
      responses:
        "204":
          description: Deleted

  /matches/{matchId}/players:
    parameters:
      - $ref: "#/components/parameters/MatchId"
    get:
      operationId: listPlayers
      tags: [matches]
      summary: List players for a match
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [matches]
      summary: Add a player to a match's roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPlayer"
      responses:
        "201":
          description: Created player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /matches/{matchId}/players/{playerId}:
    parameters:
      - $ref: "#/components/parameters/MatchId"
      - $ref: "#/components/parameters/PlayerId"
    patch:
      operationId: updatePlayer
      tags: [matches]
      summary: Update a player on a match's roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayer"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [matches]
      summary: Remove a player from a match's roster
      responses:
        "204":
          description: Deleted

  /matches/{matchId}/sets:
    parameters:
      - $ref: "#/components/parameters/MatchId"
    get:
      operationId: listSets
      tags: [matches]
      summary: List sets for a match
      responses:
        "200":
          description: List of sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchSet"
    post:
      operationId: createSet
      tags: [matches]
      summary: Start a new set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewSet"
      responses:
        "201":
          description: Created set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchSet"

  /matches/{matchId}/sets/{setId}:
    parameters:
      - $ref: "#/components/parameters/MatchId"
      - $ref: "#/components/parameters/SetId"
    patch:
      operationId: updateSet
      tags: [matches]
      # 目前唯一的用途：補上開空局時還沒選的先發方（見 MatchSet.firstServer 註解）。
      summary: Update a set (currently only used to fill in firstServer once it's chosen)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSet"
      responses:
        "200":
          description: Updated set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchSet"

  # 一次拿整場比賽的所有 event（跨 set/rally）。前端進頁重建計分表時，靠這一支避免對
  # 每個 rally 各發一次 /rallies/:id/events（一場可能有幾百個 rally = 幾百個請求）。
  # 回傳仍是扁平的 MatchEvent[]，每筆自帶 rallyId，前端再依 rallyId 分組。
  /matches/{matchId}/events:
    parameters:
      - $ref: "#/components/parameters/MatchId"
    get:
      operationId: listMatchEvents
      tags: [matches]
      summary: List all events for a match (across all its sets/rallies), for rebuilding the scoresheet
      responses:
        "200":
          description: List of events, ordered by rally then sequence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchEvent"

  /sets/{setId}/rallies:
    parameters:
      - $ref: "#/components/parameters/SetId"
    get:
      operationId: listRallies
      tags: [matches]
      summary: List rallies for a set
      responses:
        "200":
          description: List of rallies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rally"
    post:
      operationId: createRally
      tags: [matches]
      summary: Record a new rally (one point)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewRally"
      responses:
        "201":
          description: Created rally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rally"

  /rallies/{rallyId}/events:
    parameters:
      - $ref: "#/components/parameters/RallyId"
    get:
      operationId: listEvents
      tags: [matches]
      summary: List events (individual ball touches) for a rally
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchEvent"
    post:
      operationId: createEvent
      tags: [matches]
      summary: Record one ball touch, live during the match or backfilled from video review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewEvent"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchEvent"

  /rallies/{rallyId}:
    parameters:
      - $ref: "#/components/parameters/RallyId"
    delete:
      operationId: deleteRally
      tags: [matches]
      summary: Delete a rally (e.g. undo the last point; cascades to its events)
      responses:
        "204":
          description: Deleted

  # 一次拿整場比賽的所有換人紀錄（跨 set），道理跟 /matches/{matchId}/events 一樣：
  # 前端進頁重建計分表/上場名單時，一支請求就夠，不用對每個 set 各發一次。
  # substitutions 自己沒存 matchId，所以 join substitutions→sets，用 sets.matchId 過濾。
  /matches/{matchId}/substitutions:
    parameters:
      - $ref: "#/components/parameters/MatchId"
    get:
      operationId: listMatchSubstitutions
      tags: [matches]
      summary: List all substitutions for a match (across all its sets), for rebuilding lineups
      responses:
        "200":
          description: List of substitutions, ordered by set then score
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Substitution"

  /sets/{setId}/substitutions:
    parameters:
      - $ref: "#/components/parameters/SetId"
    post:
      operationId: createSubstitution
      tags: [matches]
      summary: Record one substitution (regular sub or libero in/out) within a set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewSubstitution"
      responses:
        "201":
          description: Created substitution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Substitution"

  /tactics:
    get:
      operationId: listTactics
      tags: [tactics]
      summary: List all saved tactics for the current user
      responses:
        "200":
          description: List of tactics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tactic"
    post:
      operationId: createTactic
      tags: [tactics]
      summary: Save a new tactic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTactic"
      responses:
        "201":
          description: Created tactic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tactic"

  /tactics/{tacticId}:
    parameters:
      - $ref: "#/components/parameters/TacticId"
    get:
      operationId: getTactic
      tags: [tactics]
      summary: Get a single tactic by id
      responses:
        "200":
          description: The tactic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tactic"
    put:
      operationId: updateTactic
      tags: [tactics]
      summary: Overwrite an existing tactic (name and/or data)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTactic"
      responses:
        "200":
          description: Updated tactic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tactic"
    delete:
      operationId: deleteTactic
      tags: [tactics]
      summary: Delete a tactic
      responses:
        "204":
          description: Deleted

  /events/{eventId}:
    parameters:
      - $ref: "#/components/parameters/EventId"
    patch:
      operationId: updateEvent
      tags: [matches]
      summary: Correct or fill in details on an existing event (e.g. during video review)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEvent"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchEvent"
    delete:
      operationId: deleteEvent
      tags: [matches]
      summary: Delete an event (e.g. recorded by mistake)
      responses:
        "204":
          description: Deleted

components:
  parameters:
    MatchId:
      name: matchId
      in: path
      required: true
      schema:
        type: integer
    PlayerId:
      name: playerId
      in: path
      required: true
      schema:
        type: integer
    SetId:
      name: setId
      in: path
      required: true
      schema:
        type: integer
    RallyId:
      name: rallyId
      in: path
      required: true
      schema:
        type: integer
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: integer
    TacticId:
      name: tacticId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # 跟前端比賽名單的角色定義一致 (artifacts/volleyball-tactics/src/types/match.ts 的 PLAYER_ROLES)
    # 以及後端 DB schema 的 playerRoleEnum (lib/db/src/schema/players.ts)。
    PlayerRole:
      type: string
      enum: [S, OH, MB, OPP, L]

    Player:
      type: object
      properties:
        id:
          type: integer
        matchId:
          type: integer
        name:
          type: string
        # 背號；DB schema (lib/db/src/schema/players.ts) 是 notNull，前端名單本來就有這欄位。
        number:
          type: integer
        role:
          $ref: "#/components/schemas/PlayerRole"
      required: [id, matchId, name, number, role]

    NewPlayer:
      type: object
      properties:
        name:
          type: string
        number:
          type: integer
        role:
          $ref: "#/components/schemas/PlayerRole"
      required: [name, number, role]

    Match:
      type: object
      properties:
        id:
          type: integer
        # 自訂比賽標題；nullable，因為前端目前用 opponent 當標題、不一定會填 name
        # （見 lib/db/src/schema/matches.ts 的 name 改 nullable 說明）。
        name:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        opponent:
          type: string
        location:
          type: string
          nullable: true
        # YouTube 連結；有值時前端會顯示影片播放器並啟用「賽後補填」模式。
        videoUrl:
          type: string
          nullable: true
        # 前端資料夾（Tournament）的 id；資料夾本身仍是前端 localStorage 概念，後端只當
        # 不透明字串存放/回傳。null 代表放在最上層、沒歸到任何資料夾。
        tournamentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, date, opponent, createdAt]

    NewMatch:
      type: object
      properties:
        name:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        opponent:
          type: string
        location:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        tournamentId:
          type: string
          nullable: true
      required: [date, opponent]

    UpdateMatch:
      type: object
      properties:
        opponent:
          type: string
        # 編輯比賽時可改日期時間（前端編輯表單有 datetime-local 欄位）。
        date:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        tournamentId:
          type: string
          nullable: true

    UpdatePlayer:
      type: object
      # 部分更新一名球員：三個欄位都是 optional，只帶想改的。
      properties:
        name:
          type: string
        number:
          type: integer
        role:
          $ref: "#/components/schemas/PlayerRole"

    # 這一局由哪一方先發球（home = 我方、away = 對方）。前端計分表的比分/輪轉/發球方
    # 都能從「先發方 + 各 rally 的 winner」重算，唯獨先發方推不出來，所以存在 set 上。
    ServingSide:
      type: string
      enum: [home, away]

    MatchSet:
      type: object
      properties:
        id:
          type: integer
        matchId:
          type: integer
        setNumber:
          type: integer
        # nullable：按「下一局」的當下就會先建一筆空 set row（讓 reload 能正確認出「這局還在選
        # 先發方」），此時還沒人選先發方，firstServer 就是 null；選完先發方後再用 PATCH 補上。
        firstServer:
          $ref: "#/components/schemas/ServingSide"
          nullable: true
      required: [id, matchId, setNumber, firstServer]

    NewSet:
      type: object
      properties:
        setNumber:
          type: integer
        # 開新的一局時：如果先發方還沒選（空局，見 MatchSet.firstServer 註解），送 null；
        # 已知先發方（例如既有流程「選完先發方才建 set」）就直接帶值。
        firstServer:
          $ref: "#/components/schemas/ServingSide"
          nullable: true
      required: [setNumber, firstServer]

    UpdateSet:
      type: object
      # 補上開空局時還沒選的先發方，等使用者選好之後 PATCH 這支把它填回去。
      properties:
        firstServer:
          $ref: "#/components/schemas/ServingSide"
      required: [firstServer]

    RallyWinner:
      type: string
      enum: [home, away]

    Rally:
      type: object
      properties:
        id:
          type: integer
        setId:
          type: integer
        rallyNumber:
          type: integer
        # 這分開始前的比分，不是結束後的——見 docs/db-schema-spec.md 的設計理由。
        homeScore:
          type: integer
        awayScore:
          type: integer
        winner:
          $ref: "#/components/schemas/RallyWinner"
      required: [id, setId, rallyNumber, homeScore, awayScore, winner]

    NewRally:
      type: object
      properties:
        rallyNumber:
          type: integer
        homeScore:
          type: integer
        awayScore:
          type: integer
        winner:
          $ref: "#/components/schemas/RallyWinner"
      required: [rallyNumber, homeScore, awayScore, winner]

    # 換人的種類，見 lib/db/src/schema/substitutions.ts 的 substitutionKindEnum 註解：
    # regular = 一般換人；libero = 自由球員上/下（規則上不算正式換人次數，但記錄結構相同）。
    SubstitutionKind:
      type: string
      enum: [regular, libero]

    Substitution:
      type: object
      properties:
        id:
          type: integer
        setId:
          type: integer
        # 換人發生的「時機」，存的是這一局當下的比分快照（而非 rallyId）——
        # 理由跟 Rally 的 homeScore/awayScore 一樣，見 lib/db/src/schema/substitutions.ts。
        homeScore:
          type: integer
        awayScore:
          type: integer
        # 上場、下場的球員；nullable，理由見 substitutions.ts：即使不知道是「誰」，
        # 「這一局發生過一次換人」本身仍有統計意義，球員被刪除時不該連帶刪掉這筆紀錄。
        playerInId:
          type: integer
          nullable: true
        playerOutId:
          type: integer
          nullable: true
        kind:
          $ref: "#/components/schemas/SubstitutionKind"
      required: [id, setId, homeScore, awayScore, playerInId, playerOutId, kind]

    NewSubstitution:
      type: object
      properties:
        homeScore:
          type: integer
        awayScore:
          type: integer
        playerInId:
          type: integer
          nullable: true
        playerOutId:
          type: integer
          nullable: true
        kind:
          $ref: "#/components/schemas/SubstitutionKind"
      required: [homeScore, awayScore, kind]

    EventAction:
      type: string
      enum: [serve, receive, set, attack, block, dig]

    # 只在 receive/dig 動作才有意義，用來把一傳/防守細分成接發/接扣(S)/嗆司/接吊(T)四類做統計。
    BallType:
      type: string
      enum: [serve, spike, tip, chance]

    EventSource:
      type: string
      enum: [live, review]

    # 這一球由哪一方執行（home = 我方、away = 對方），跟 RallyWinner（誰得分）是不同概念。
    # 見 lib/db/src/schema/events.ts 的 eventSideEnum。
    EventSide:
      type: string
      enum: [home, away]

    MatchEvent:
      type: object
      properties:
        id:
          type: integer
        rallyId:
          type: integer
        sequence:
          type: integer
        # 哪一方執行這球，見 EventSide。
        side:
          $ref: "#/components/schemas/EventSide"
        # nullable：只有我方 (side = home) 動作對得到名單球員；對方動作與簡易版「對手(全體)」留空。
        playerId:
          type: integer
          nullable: true
        action:
          $ref: "#/components/schemas/EventAction"
        ballType:
          $ref: "#/components/schemas/BallType"
        # 0~3 品質評分，0 = 直接失誤，3 = 完美到位。用來算「到位率」。
        quality:
          type: integer
          nullable: true
        # 跟前端球場 SVG 同一個座標系：viewBox 0~100 (寬) x 0~200 (長)。
        # nullable：只有進階版（賽後精確記落點）才填；簡易版只記動作、不點座標。
        fromX:
          type: number
          nullable: true
        fromY:
          type: number
          nullable: true
        toX:
          type: number
          nullable: true
        toY:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string
        note:
          type: string
          nullable: true
        # 對應 YouTube 播放秒數，只有 source = 'review' 時才會有值。
        videoTimestamp:
          type: integer
          nullable: true
        source:
          $ref: "#/components/schemas/EventSource"
      required: [id, rallyId, sequence, side, action, tags, source]

    NewEvent:
      type: object
      properties:
        sequence:
          type: integer
        side:
          $ref: "#/components/schemas/EventSide"
        playerId:
          type: integer
          nullable: true
        action:
          $ref: "#/components/schemas/EventAction"
        ballType:
          $ref: "#/components/schemas/BallType"
        quality:
          type: integer
          nullable: true
        fromX:
          type: number
          nullable: true
        fromY:
          type: number
          nullable: true
        toX:
          type: number
          nullable: true
        toY:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string
        note:
          type: string
          nullable: true
        videoTimestamp:
          type: integer
          nullable: true
        source:
          $ref: "#/components/schemas/EventSource"
      required: [sequence, side, action, source]

    Tactic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        # TacticsState 的完整快照，以 jsonb 存在 DB，前端直接解析成 TacticsState 型別。
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, data, createdAt, updatedAt]

    NewTactic:
      type: object
      properties:
        name:
          type: string
        data:
          type: object
          additionalProperties: true
      required: [name, data]

    UpdateTactic:
      type: object
      properties:
        name:
          type: string
        data:
          type: object
          additionalProperties: true

    UpdateEvent:
      type: object
      properties:
        side:
          $ref: "#/components/schemas/EventSide"
        action:
          $ref: "#/components/schemas/EventAction"
        ballType:
